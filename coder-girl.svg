<svg width="900" height="480" viewBox="0 0 900 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a1f1f"/>
      <stop offset="25%" stop-color="#4a3030"/>
      <stop offset="55%" stop-color="#6b4c4c"/>
      <stop offset="80%" stop-color="#7a4a5a"/>
      <stop offset="100%" stop-color="#5a3545"/>
    </linearGradient>
    <linearGradient id="deskGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8b6a5a"/>
      <stop offset="100%" stop-color="#5a3545"/>
    </linearGradient>
    <linearGradient id="hairGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a1a1a"/>
      <stop offset="100%" stop-color="#4a2f2f"/>
    </linearGradient>
    <linearGradient id="hoodieGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7a4a5a"/>
      <stop offset="100%" stop-color="#5a3040"/>
    </linearGradient>
    <radialGradient id="screenGlow" cx="50%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#ffb000" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffb000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="auraGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e8d0c8" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#e8d0c8" stop-opacity="0"/>
    </radialGradient>
    <filter id="softBlur"><feGaussianBlur stdDeviation="6"/></filter>
  </defs>

  <!-- background -->
  <rect width="900" height="480" rx="24" fill="url(#bgGrad)"/>

  <!-- stars / particles -->
  <g fill="#f5ede8">
    <circle cx="60" cy="60" r="2"><animate attributeName="opacity" values="0.2;1;0.2" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="140" cy="110" r="1.5"><animate attributeName="opacity" values="1;0.2;1" dur="2.4s" repeatCount="indefinite"/></circle>
    <circle cx="820" cy="70" r="2"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.8s" repeatCount="indefinite"/></circle>
    <circle cx="760" cy="140" r="1.5"><animate attributeName="opacity" values="1;0.3;1" dur="3.4s" repeatCount="indefinite"/></circle>
    <circle cx="450" cy="40" r="1.5"><animate attributeName="opacity" values="0.2;1;0.2" dur="2s" repeatCount="indefinite"/></circle>
    <circle cx="250" cy="45" r="1.2"><animate attributeName="opacity" values="1;0.3;1" dur="3.1s" repeatCount="indefinite"/></circle>
  </g>

  <!-- ambient aura behind girl -->
  <circle cx="450" cy="270" r="180" fill="url(#auraGlow)"/>

  <!-- floating code glyphs -->
  <g font-family="Fira Code, monospace" font-size="20" fill="#e8d0c8" opacity="0.75">
    <text x="120" y="180">&lt;/&gt;</text>
    <text x="700" y="160">{ }</text>
    <text x="740" y="260">01</text>
    <text x="90" y="300">fn()</text>
    <text x="130" y="380" font-size="15">AI/ML</text>
    <animateTransform xlink:href="#none" attributeName="transform" type="translate"/>
  </g>
  <g font-family="Fira Code, monospace" font-size="20" fill="#c0614a" opacity="0.85">
    <text x="120" y="180">
      &lt;/&gt;
      <animate attributeName="y" values="180;168;180" dur="4s" repeatCount="indefinite"/>
    </text>
  </g>
  <text x="700" y="160" font-family="Fira Code, monospace" font-size="20" fill="#e8d0c8" opacity="0.8">{ }
    <animate attributeName="y" values="160;146;160" dur="3.6s" repeatCount="indefinite"/>
  </text>
  <text x="745" y="255" font-family="Fira Code, monospace" font-size="18" fill="#f5ede8" opacity="0.7">01
    <animate attributeName="y" values="255;270;255" dur="3.2s" repeatCount="indefinite"/>
  </text>
  <text x="95" y="300" font-family="Fira Code, monospace" font-size="16" fill="#c0614a" opacity="0.75">fn()
    <animate attributeName="y" values="300;286;300" dur="4.4s" repeatCount="indefinite"/>
  </text>
  <text x="120" y="390" font-family="Fira Code, monospace" font-size="14" fill="#e8d0c8" opacity="0.7">AI/ML
    <animate attributeName="y" values="390;378;390" dur="3.8s" repeatCount="indefinite"/>
  </text>

  <!-- desk -->
  <rect x="150" y="360" width="600" height="26" rx="8" fill="url(#deskGrad)"/>
  <rect x="180" y="386" width="18" height="70" fill="#3a2a2a"/>
  <rect x="690" y="386" width="18" height="70" fill="#3a2a2a"/>

  <!-- coffee mug -->
  <g>
    <ellipse cx="590" cy="356" rx="24" ry="8" fill="#3a2422"/>
    <rect x="566" y="330" width="48" height="30" rx="6" fill="#c0614a"/>
    <path d="M614,338 q16,4 0,20" fill="none" stroke="#c0614a" stroke-width="5"/>
    <path d="M576,326 q-4,-14 4,-24" fill="none" stroke="#f5ede8" stroke-width="3" opacity="0.6" stroke-linecap="round">
      <animate attributeName="d" values="M576,326 q-4,-14 4,-24;M576,318 q-4,-14 4,-24;M576,326 q-4,-14 4,-24" dur="2.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0.1;0.6" dur="2.6s" repeatCount="indefinite"/>
    </path>
    <path d="M596,326 q-4,-14 4,-24" fill="none" stroke="#f5ede8" stroke-width="3" opacity="0.5" stroke-linecap="round">
      <animate attributeName="d" values="M596,326 q-4,-14 4,-24;M596,316 q-4,-14 4,-24;M596,326 q-4,-14 4,-24" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0.1;0.5" dur="3s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- laptop -->
  <g>
    <rect x="330" y="352" width="220" height="14" rx="4" fill="#4a3535"/>
    <rect x="345" y="230" width="190" height="122" rx="6" fill="#2a1e1e"/>
    <rect x="355" y="240" width="170" height="102" rx="3" fill="#1a1212"/>
    <circle cx="440" cy="291" r="80" fill="url(#screenGlow)" filter="url(#softBlur)"/>
    <!-- code lines typing in -->
    <g font-family="Fira Code, monospace" font-size="9">
      <rect x="365" y="250" width="0" height="6" fill="#ffb000"><animate attributeName="width" values="0;70" dur="0.6s" begin="0.2s" fill="freeze"/></rect>
      <rect x="365" y="262" width="0" height="6" fill="#5eead4"><animate attributeName="width" values="0;110" dur="0.7s" begin="0.9s" fill="freeze"/></rect>
      <rect x="375" y="274" width="0" height="6" fill="#f5ede8" opacity="0.8"><animate attributeName="width" values="0;90" dur="0.6s" begin="1.7s" fill="freeze"/></rect>
      <rect x="375" y="286" width="0" height="6" fill="#ffb000" opacity="0.9"><animate attributeName="width" values="0;60" dur="0.5s" begin="2.4s" fill="freeze"/></rect>
      <rect x="365" y="298" width="0" height="6" fill="#5eead4"><animate attributeName="width" values="0;130" dur="0.8s" begin="3s" fill="freeze"/></rect>
      <rect x="375" y="310" width="0" height="6" fill="#f5ede8" opacity="0.7"><animate attributeName="width" values="0;75" dur="0.6s" begin="3.9s" fill="freeze"/></rect>
      <rect x="365" y="322" width="0" height="6" fill="#ffb000" opacity="0.85"><animate attributeName="width" values="0;100" dur="0.7s" begin="4.6s" fill="freeze"/></rect>
      <animate attributeName="opacity" values="1" begin="5.5s" dur="0.1s"/>
    </g>
    <rect x="355" y="240" width="170" height="102" rx="3" fill="none">
      <animate attributeName="opacity" values="0" begin="5.4s" dur="0.1s" fill="freeze"/>
    </rect>
  </g>

  <!-- girl silhouette -->
  <g>
    <!-- torso / hoodie, waist-tapered -->
    <path d="M406,352 Q398,300 415,272 Q432,258 450,258 Q468,258 485,272 Q502,300 494,352 Z" fill="url(#hoodieGrad)"/>
    <!-- waist taper shading -->
    <path d="M415,272 Q408,310 412,340" stroke="#4a2535" stroke-width="2" fill="none" opacity="0.5"/>
    <path d="M485,272 Q492,310 488,340" stroke="#4a2535" stroke-width="2" fill="none" opacity="0.5"/>
    <!-- hood collar -->
    <path d="M422,270 Q450,292 478,270 L478,281 Q450,300 422,281 Z" fill="#4a2535" opacity="0.8"/>
    <!-- little heart patch -->
    <path d="M446,318 q4,-6 8,-2 q4,-4 8,2 q-8,10 -8,10 q0,0 -8,-10 Z" fill="#e8d0c8" opacity="0.55"/>
    <!-- arms to keyboard, rolled sleeve cuffs -->
    <path d="M412,296 Q384,318 376,344" stroke="url(#hoodieGrad)" stroke-width="19" fill="none" stroke-linecap="round"/>
    <path d="M488,296 Q516,318 522,344" stroke="url(#hoodieGrad)" stroke-width="19" fill="none" stroke-linecap="round"/>
    <circle cx="380" cy="330" r="9" fill="#e8d0c8" opacity="0.5"/>
    <circle cx="518" cy="330" r="9" fill="#e8d0c8" opacity="0.5"/>
    <circle cx="376" cy="348" r="8.5" fill="#e8c4a8"/>
    <circle cx="521" cy="348" r="8.5" fill="#e8c4a8"/>

    <!-- neck -->
    <rect x="440" y="248" width="20" height="18" rx="6" fill="#e8c4a8"/>

    <!-- head, slightly softer/rounder jaw -->
    <path d="M450,175 Q490,178 492,215 Q493,248 450,254 Q407,248 408,215 Q410,178 450,175 Z" fill="#e8c4a8"/>

    <!-- ponytail: fuller, wavy, with strand texture -->
    <path d="M452,180 Q424,172 420,208 Q416,244 436,262 Q450,270 452,262 Q432,250 432,214 Q433,192 452,180 Z" fill="url(#hairGrad)"/>
    <path d="M424,196 Q374,180 340,140 Q332,128 340,120 Q378,158 428,200 Z" fill="url(#hairGrad)">
      <animateTransform attributeName="transform" type="rotate" values="0 424 196; 5 424 196; 0 424 196" dur="3.5s" repeatCount="indefinite"/>
    </path>
    <path d="M345,132 Q378,162 412,192" stroke="#f5ede8" stroke-width="1.4" opacity="0.25" fill="none">
      <animateTransform attributeName="transform" type="rotate" values="0 424 196; 5 424 196; 0 424 196" dur="3.5s" repeatCount="indefinite"/>
    </path>
    <path d="M354,150 Q384,176 410,198" stroke="#f5ede8" stroke-width="1.2" opacity="0.2" fill="none">
      <animateTransform attributeName="transform" type="rotate" values="0 424 196; 5 424 196; 0 424 196" dur="3.5s" repeatCount="indefinite"/>
    </path>
    <!-- scrunchie -->
    <ellipse cx="424" cy="193" rx="11" ry="8" fill="#c0614a"/>
    <ellipse cx="424" cy="193" rx="11" ry="8" fill="none" stroke="#8b4030" stroke-width="1.5" opacity="0.6"/>

    <!-- side-swept face-framing hair -->
    <path d="M410,196 Q396,222 402,252 Q408,262 414,258 Q404,228 416,200 Z" fill="url(#hairGrad)"/>
    <path d="M490,196 Q502,220 497,246 Q493,255 488,251 Q496,224 486,200 Z" fill="url(#hairGrad)"/>

    <!-- top fringe / hairline -->
    <path d="M410,196 Q450,166 490,196 Q488,208 478,206 Q450,182 422,206 Q412,208 410,196 Z" fill="url(#hairGrad)"/>
    <!-- side-part swoop strand across forehead -->
    <path d="M418,200 Q440,190 462,200" stroke="url(#hairGrad)" stroke-width="6" fill="none" stroke-linecap="round"/>

    <!-- ears + small earrings -->
    <circle cx="410" cy="222" r="5" fill="#e8c4a8"/>
    <circle cx="490" cy="222" r="5" fill="#e8c4a8"/>
    <circle cx="410" cy="228" r="2" fill="#c0614a"/>
    <circle cx="490" cy="228" r="2" fill="#c0614a"/>

    <!-- eyebrows -->
    <path d="M424,206 Q432,201 441,205" stroke="#2a1e1e" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <path d="M459,205 Q468,201 476,206" stroke="#2a1e1e" stroke-width="2.2" fill="none" stroke-linecap="round"/>

    <!-- glasses -->
    <g>
      <circle cx="432" cy="218" r="15" fill="none" stroke="#2a1e1e" stroke-width="3"/>
      <circle cx="468" cy="218" r="15" fill="none" stroke="#2a1e1e" stroke-width="3"/>
      <line x1="447" y1="218" x2="453" y2="218" stroke="#2a1e1e" stroke-width="3"/>
      <line x1="417" y1="217" x2="408" y2="214" stroke="#2a1e1e" stroke-width="2.5"/>
      <line x1="483" y1="217" x2="492" y2="214" stroke="#2a1e1e" stroke-width="2.5"/>
      <circle cx="432" cy="218" r="12" fill="#ffb000" opacity="0.35"/>
      <circle cx="468" cy="218" r="12" fill="#5eead4" opacity="0.3"/>
      <!-- lashes -->
      <path d="M420,210 l-3,-4" stroke="#2a1e1e" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M480,210 l3,-4" stroke="#2a1e1e" stroke-width="1.5" stroke-linecap="round"/>
    </g>

    <!-- blush -->
    <ellipse cx="418" cy="234" rx="8" ry="5" fill="#e88a8a" opacity="0.3"/>
    <ellipse cx="482" cy="234" rx="8" ry="5" fill="#e88a8a" opacity="0.3"/>

    <!-- nose hint -->
    <path d="M448,224 Q450,230 447,232" stroke="#c99a78" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.7"/>

    <!-- lips / smile -->
    <path d="M438,240 Q450,247 462,240" stroke="#a85050" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>

  <!-- screen glow reflecting on desk -->
  <ellipse cx="440" cy="368" rx="90" ry="8" fill="#ffb000" opacity="0.15">
    <animate attributeName="opacity" values="0.1;0.25;0.1" dur="2.4s" repeatCount="indefinite"/>
  </ellipse>
</svg>
