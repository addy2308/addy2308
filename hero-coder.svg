<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0b12"/>
      <stop offset="45%" stop-color="#181022"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
    <linearGradient id="screenGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00fff2" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#0090a8" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="hoodie" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7a4a5a"/>
      <stop offset="100%" stop-color="#4a2f3a"/>
    </linearGradient>
    <linearGradient id="hair" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2b1c22"/>
      <stop offset="100%" stop-color="#150d11"/>
    </linearGradient>
    <linearGradient id="skin" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c98f6e"/>
      <stop offset="100%" stop-color="#a86e52"/>
    </linearGradient>
    <radialGradient id="deskGlow" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#ffb000" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffb000" stop-opacity="0"/>
    </radialGradient>
    <filter id="neon" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softblur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="900" height="500" rx="18" fill="url(#bg)"/>

  <!-- ambient grid dots -->
  <g fill="#ffb000" opacity="0.08">
    <g id="dotrow">
      <circle cx="30" cy="30" r="1.6"/><circle cx="80" cy="30" r="1.6"/><circle cx="130" cy="30" r="1.6"/>
      <circle cx="180" cy="30" r="1.6"/><circle cx="230" cy="30" r="1.6"/><circle cx="280" cy="30" r="1.6"/>
      <circle cx="330" cy="30" r="1.6"/><circle cx="380" cy="30" r="1.6"/><circle cx="430" cy="30" r="1.6"/>
      <circle cx="480" cy="30" r="1.6"/><circle cx="530" cy="30" r="1.6"/><circle cx="580" cy="30" r="1.6"/>
      <circle cx="630" cy="30" r="1.6"/><circle cx="680" cy="30" r="1.6"/><circle cx="730" cy="30" r="1.6"/>
      <circle cx="780" cy="30" r="1.6"/><circle cx="830" cy="30" r="1.6"/><circle cx="870" cy="30" r="1.6"/>
    </g>
    <use href="#dotrow" y="60"/><use href="#dotrow" y="120"/><use href="#dotrow" y="420"/><use href="#dotrow" y="460"/>
  </g>

  <!-- glow behind desk -->
  <ellipse cx="450" cy="330" rx="380" ry="160" fill="url(#deskGlow)"/>

  <!-- floating code particles -->
  <g font-family="monospace" font-size="20" filter="url(#neon)">
    <text x="90" y="90" fill="#00fff2" opacity="0.7">&lt;/&gt;</text>
    <text x="740" y="110" fill="#ffb000" opacity="0.65">{ }</text>
    <text x="110" y="230" fill="#ffb000" opacity="0.5">01</text>
    <text x="770" y="240" fill="#00fff2" opacity="0.55">;</text>
    <text x="60" y="380" fill="#00fff2" opacity="0.4">10</text>
    <text x="800" y="380" fill="#ffb000" opacity="0.45">&lt;/&gt;</text>
    <text x="650" y="70" fill="#00fff2" opacity="0.4">fn()</text>
    <text x="150" y="130" fill="#ffb000" opacity="0.35">=&gt;</text>
  </g>

  <!-- desk surface -->
  <path d="M120 400 L780 400 L760 430 L140 430 Z" fill="#1c1420"/>
  <rect x="120" y="398" width="660" height="6" fill="#2b2030"/>

  <!-- coffee cup + steam -->
  <g transform="translate(600,330)">
    <path d="M0 40 L8 70 Q10 78 20 78 L44 78 Q54 78 56 70 L64 40 Z" fill="#3a2a30" stroke="#ffb000" stroke-width="1.5" opacity="0.9"/>
    <ellipse cx="32" cy="40" rx="32" ry="7" fill="#251a20"/>
    <path d="M56 46 Q76 50 74 66 Q72 78 58 76" fill="none" stroke="#ffb000" stroke-width="3" opacity="0.85" stroke-linecap="round"/>
    <g stroke="#f5ede8" stroke-width="2.5" fill="none" opacity="0.55" filter="url(#softblur)">
      <path d="M14 30 Q8 15 16 5 Q22 -3 16 -14"/>
      <path d="M32 30 Q26 12 34 2 Q40 -6 34 -16"/>
      <path d="M50 30 Q44 15 52 5 Q58 -3 52 -14"/>
    </g>
  </g>

  <!-- laptop -->
  <g transform="translate(300,250)">
    <!-- base -->
    <path d="M-40 130 L340 130 L365 155 L-65 155 Z" fill="#2b2030"/>
    <path d="M-40 130 L340 130 L340 138 L-40 138 Z" fill="#3a2c3e"/>
    <!-- screen back -->
    <path d="M-10 0 L310 0 L330 130 L10 130 Z" fill="#241a28"/>
    <!-- screen -->
    <rect x="12" y="14" width="286" height="104" rx="4" fill="url(#screenGlow)" opacity="0.92"/>
    <rect x="12" y="14" width="286" height="104" rx="4" fill="none" stroke="#00fff2" stroke-width="1" opacity="0.5" filter="url(#neon)"/>
    <!-- code lines on screen -->
    <g font-family="monospace" font-size="9" fill="#062229" opacity="0.85">
      <text x="24" y="32">const build = () =&gt; {</text>
      <text x="34" y="46">deploy(dreams);</text>
      <text x="34" y="60">return coffee + code;</text>
      <text x="24" y="74">}</text>
      <text x="24" y="92">// status: shipping</text>
      <text x="24" y="106">✓ tests passed</text>
    </g>
  </g>

  <!-- chair back hint -->
  <path d="M470 130 Q560 90 560 220 L560 380 Q560 400 540 400 L500 400 Q480 400 480 380 Z" fill="#171019" opacity="0.6"/>

  <!-- character sitting behind laptop -->
  <g transform="translate(430,120)">
    <!-- ponytail -->
    <path d="M35 20 Q80 -10 95 40 Q108 85 80 110 Q95 130 82 160 Q70 185 48 175 Q60 150 50 125 Q40 100 30 90 Q20 60 35 20 Z" fill="url(#hair)"/>
    <ellipse cx="42" cy="22" rx="10" ry="6" fill="#ffb000" opacity="0.85"/>

    <!-- hoodie / shoulders -->
    <path d="M-70 190 Q-70 110 0 95 Q70 80 130 100 Q190 118 190 190 L190 230 L-70 230 Z" fill="url(#hoodie)"/>
    <path d="M-40 130 Q0 150 40 130" stroke="#3a2530" stroke-width="4" fill="none" opacity="0.6"/>

    <!-- neck -->
    <rect x="35" y="70" width="30" height="30" rx="8" fill="url(#skin)"/>

    <!-- head -->
    <ellipse cx="50" cy="45" rx="42" ry="46" fill="url(#skin)"/>

    <!-- hair front / fringe -->
    <path d="M10 20 Q50 -20 90 20 Q92 5 70 -5 Q50 -14 30 -5 Q10 5 10 20 Z" fill="url(#hair)"/>
    <path d="M8 25 Q20 5 15 45 Q6 40 8 25 Z" fill="url(#hair)"/>
    <path d="M92 25 Q80 5 85 45 Q94 40 92 25 Z" fill="url(#hair)"/>

    <!-- glasses -->
    <g stroke="#0d0b12" stroke-width="3" fill="#0d0b12" fill-opacity="0.12">
      <rect x="18" y="42" width="28" height="20" rx="7"/>
      <rect x="56" y="42" width="28" height="20" rx="7"/>
      <line x1="46" y1="50" x2="56" y2="50"/>
      <line x1="18" y1="48" x2="6" y2="44"/>
      <line x1="84" y1="48" x2="96" y2="44"/>
    </g>
    <circle cx="32" cy="52" r="2" fill="#00fff2" filter="url(#neon)"/>
    <circle cx="70" cy="52" r="2" fill="#00fff2" filter="url(#neon)"/>

    <!-- soft smile -->
    <path d="M38 70 Q50 78 62 70" stroke="#5a3020" stroke-width="2.5" fill="none" stroke-linecap="round"/>

    <!-- arms typing -->
    <path d="M-40 190 Q-20 150 20 155" stroke="url(#hoodie)" stroke-width="26" fill="none" stroke-linecap="round"/>
    <path d="M170 190 Q150 150 110 155" stroke="url(#hoodie)" stroke-width="26" fill="none" stroke-linecap="round"/>
    <circle cx="18" cy="158" r="10" fill="url(#skin)"/>
    <circle cx="112" cy="158" r="10" fill="url(#skin)"/>
  </g>

  <!-- screen glow reflected on face area -->
  <ellipse cx="480" cy="230" rx="90" ry="30" fill="#00fff2" opacity="0.06" filter="url(#softblur)"/>

  <!-- border frame -->
  <rect x="3" y="3" width="894" height="494" rx="16" fill="none" stroke="#ffb000" stroke-opacity="0.25" stroke-width="1.5"/>
</svg>
